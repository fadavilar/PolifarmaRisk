<script>
(function () {
  "use strict";

  /* ---------------------------------------------------------------------

   * ------------------------------------------------------------------- */

  var CONDITIONS = [
    { id: "HTA", label: "Hipertensión Arterial" },

  // ("/" o "+") y buscando cada principio activo por separado. Nota metodológica: el riesgo de
  // interacción se evalúa por identidad del principio activo, no por su concentración en mg —
  // por eso la clasificación ignora dosis y solo compara nombres de sustancia normalizados.
  // Se construye de forma diferida (no al cargar el script) porque depende de normalize(),

    var map = {};
    for (var group in MED_CATALOG) {
      MED_CATALOG[group].forEach(function (m) {
        m.name.split(/[\/+]/).forEach(function (tok) {
          var key = normalize(tok);
          if (key && !map[key]) map[key] = m.cls;
        });
      });
    }
    return map;
  }

  // nombre y evalúa el riesgo de interacción de cada principio activo componente por separado,
  // en vez de tratar la combinación como una entidad opaca sin clasificar.
  function classifyMedName(name) {
    if (!SUBSTANCE_CLASS) SUBSTANCE_CLASS = buildSubstanceClassMap();
    var classes = [];
    var whole = findCatalogEntry(name);
    if (whole && whole.cls && classes.indexOf(whole.cls) === -1) classes.push(whole.cls);
    (name || "").split(/[\/+]/).forEach(function (tok) {
      var key = normalize(tok);
      var cls = SUBSTANCE_CLASS[key];
      if (cls && classes.indexOf(cls) === -1) classes.push(cls);
    });

  var ACCENT_MAP = { "á":"a","à":"a","ä":"a","â":"a","é":"e","è":"e","ë":"e","ê":"e","í":"i","ì":"i","ï":"i","î":"i","ó":"o","ò":"o","ö":"o","ô":"o","ú":"u","ù":"u","ü":"u","û":"u","ñ":"n","ç":"c" };
  function normalize(s) {
    s = (s || "").toString().trim().toLowerCase();
    var out = "";
    for (var i = 0; i < s.length; i++) {
      var ch = s.charAt(i);
      out += ACCENT_MAP[ch] || ch;
    }
    return out;
  }

  function escapeHtml(s) {
    return (s || "").toString().replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  var ACRONYMS = {
    "HTA": "Hipertensión Arterial",
    "DM2": "Diabetes Mellitus Tipo 2",
    "EPOC": "Enfermedad Pulmonar Obstructiva Crónica",
    "ICC": "Insuficiencia Cardíaca Crónica",
    "ERC": "Enfermedad Renal Crónica",
    "FA": "Fibrilación Auricular",
    "LASA": "Look-Alike, Sound-Alike (medicamentos con nombre o aspecto similar)",
    "IECA": "Inhibidor de la Enzima Convertidora de Angiotensina",
    "ARA II": "Antagonista de los Receptores de Angiotensina II",
    "AINEs": "Antiinflamatorios No Esteroideos",
    "AINE": "Antiinflamatorio No Esteroideo",
    "ISRS": "Inhibidor Selectivo de la Recaptación de Serotonina",
    "IRSN": "Inhibidor de la Recaptación de Serotonina y Noradrenalina",
    "ACOD": "Anticoagulante Oral Directo",
    "AVK": "Antagonista de la Vitamina K",
    "IBP": "Inhibidor de la Bomba de Protones",
    "ARNI": "Inhibidor de la Neprilisina y del Receptor de Angiotensina",
    "SGLT2": "Cotransportador de Sodio-Glucosa Tipo 2",
    "DPP-4": "Dipeptidil Peptidasa 4",
    "GLP-1": "Péptido Similar al Glucagón Tipo 1",
    "PCSK9": "Proproteína Convertasa Subtilisina/Kexina Tipo 9",
    "CYP3A4": "Citocromo P450 3A4 (enzima hepática que metaboliza fármacos)",
    "CYP2C19": "Citocromo P450 2C19 (enzima hepática que metaboliza fármacos)",
    "CPK": "Creatina Fosfoquinasa (marcador de daño muscular)",
    "INR": "Razón Internacional Normalizada (control de anticoagulación)",
    "TFG": "Tasa de Filtración Glomerular (medida de función renal)",
    "ATC": "Anatomical Therapeutic Chemical (clasificación anatómica-terapéutica-química)",
    "CUM": "Código Único de Medicamentos (INVIMA, Colombia)",
    "IMC": "Índice de Masa Corporal",
    "ISMP": "Institute for Safe Medication Practices",
    "PRN": "Pro Re Nata — según necesidad"
  };
  var ACRONYM_KEYS = Object.keys(ACRONYMS).sort(function (a, b) { return b.length - a.length; });

  function withAbbr(text) {
    if (!text) return "";
    var result = escapeHtml(text);
    ACRONYM_KEYS.forEach(function (k) {
      var esc = k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      var re = new RegExp("\\b" + esc + "\\b", "g");
      result = result.replace(re, '<abbr title="' + escapeHtml(ACRONYMS[k]) + '">' + k + "</abbr>");
    });
    return result;
  }

  function findCatalogEntry(name) {
    var n = normalize(name);
    for (var group in MED_CATALOG) {
      var list = MED_CATALOG[group];
      for (var i = 0; i < list.length; i++) {
        if (normalize(list[i].name) === n) return list[i];
      }
    }
    return null;
  }

  function levenshtein(a, b) {
    var m = a.length, n = b.length;
    if (m === 0) return n;
    if (n === 0) return m;
    var d = [];
    for (var i = 0; i <= m; i++) d.push([i]);
    for (var j = 0; j <= n; j++) d[0][j] = j;
    for (i = 1; i <= m; i++) {
      for (j = 1; j <= n; j++) {
        var cost = a.charAt(i - 1) === b.charAt(j - 1) ? 0 : 1;
        d[i][j] = Math.min(d[i - 1][j] + 1, d[i][j - 1] + 1, d[i - 1][j - 1] + cost);
      }
    }
    return d[m][n];
  }

  function similarity(a, b) {
    var na = normalize(a), nb = normalize(b);
    var maxLen = Math.max(na.length, nb.length) || 1;
    return 1 - levenshtein(na, nb) / maxLen;
  }

  // Regla LASA por patrón posicional — generaliza la Tabla 2 de OMS 2023 ("Medication safety for
  // look-alike, sound-alike medicines"), que documenta confusión por letras compartidas al INICIO
  // (p. ej. "Am-", "Az-", "Carb-", "Pr-"), en MEDIO (p. ej. "-gaba-") o al FINAL (p. ej. "-azol") del
  // nombre. La OMS solo da un puñado de ejemplos textuales; esta función los generaliza a una regla
  // aplicable a cualquier par de medicamentos, con umbrales calibrados (no arbitrarios) para controlar
  // falsos positivos: se midió la similitud de Levenshtein real de los pares que cita la propia OMS
  // (0.25–0.73, mediana ~0.45) y se fijó el umbral de similitud mínima un poco por debajo de esa
  // mediana. Un prefijo o sufijo compartido de solo 1 letra es demasiado débil (ruido); de ahí el
  // mínimo de 2 (igual al de los ejemplos "Am"/"Az" de la propia OMS). Se exige además una longitud
  // mínima de palabra (6) para evitar coincidencias triviales en nombres cortos.
  function sharedPrefixLen(a, b) {
    var i = 0;
    while (i < a.length && i < b.length && a.charAt(i) === b.charAt(i)) i++;
    return i;
  }
  function sharedSuffixLen(a, b) {
    var i = 0;
    while (i < a.length && i < b.length && a.charAt(a.length - 1 - i) === b.charAt(b.length - 1 - i)) i++;
    return i;
  }
  function lasaPatternMatch(nameA, nameB) {
    var a = normalize(nameA), b = normalize(nameB);
    if (Math.min(a.length, b.length) < 6 || Math.abs(a.length - b.length) > 3) return null;
    var sim = 1 - levenshtein(a, b) / (Math.max(a.length, b.length) || 1);
    var prefix = sharedPrefixLen(a, b);
    if (prefix >= 2 && sim >= 0.38) {
      return { mechanism: 'comparten el inicio "' + a.substring(0, prefix).toUpperCase() + '-"', score: Math.round(sim * 60) };
    }
    // El umbral de similitud para sufijo es más alto que para prefijo (0.45 vs 0.38) porque los
    // sufijos en nombres de medicamentos en español suelen ser morfemas de clase farmacológica
    // muy comunes (p. ej. "-tina" en casi todas las estatinas y gliptinas), no un indicio real de
    // confusión — a diferencia del inicio del nombre, que suele ser la parte distintiva. Detectado
    // empíricamente: "Rosuvastatina"/"Sitagliptina" comparten "-tina" (4 letras) pero su similitud
    // global es solo 0.38, muy por debajo de pares con sufijo genuinamente distintivo como
    // "Metronidazol"/"Omeprazol" (comparten "-azol", similitud 0.50); el umbral se fijó entre ambos.
    var suffix = sharedSuffixLen(a, b);
    if (suffix >= 4 && sim >= 0.45) {
      return { mechanism: 'comparten la terminación "-' + a.substring(a.length - suffix).toUpperCase() + '"', score: Math.round(sim * 60) };
    }
    return null;
  }

  function levelFromScore(score) {
    if (score > 60) return "high";
    if (score > 30) return "medium";
    return "low";
  }

  function levelLabel(level) {
    return { low: "Bajo", medium: "Medio", high: "Alto" }[level] || "Bajo";
  }

  function toast(msg) {
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { el.classList.remove("show"); }, 2200);
  }

  /* ---------------------------------------------------------------------
   * 3. MOTOR DE ANÁLISIS DE RIESGO
   * ------------------------------------------------------------------- */

  function analyzePatient(patient) {
    var meds = patient.meds.map(function (m) {
      return {
        name: m.name, dosage: m.dosage, freq: m.freq, route: m.route, indication: m.indication,
        classes: classifyMedName(m.name)
      };
    });

    var interactions = [];
    var seenPairs = {};

    // La clave incluye el mecanismo de la regla, no solo el par de medicamentos: un medicamento
    // de combinación puede coincidir con más de una CLASS_PAIR_RULES distinta para el mismo par
    // (p. ej. un combo IECA+diurético frente a un AINE dispara tanto la regla de perfusión renal
    // del diurético como la de prostaglandinas del IECA), y ambas deben mostrarse, no solo la primera.
    function addInteraction(m1, m2, rule) {
      var key = normalize(m1.name) + "|" + normalize(m2.name) + "|" + rule.mechanism;
      if (seenPairs[key]) return;
      seenPairs[key] = true;
      interactions.push({
        med1: m1.name, med2: m2.name, severity: rule.severity,
        mechanism: rule.mechanism, description: rule.description, recommendation: rule.recommendation,
        src: rule.src || GENERAL_SRC
      });
    }

    for (var i = 0; i < meds.length; i++) {
      for (var j = i + 1; j < meds.length; j++) {
        var m1 = meds[i], m2 = meds[j];
        var n1 = normalize(m1.name), n2 = normalize(m2.name);

        for (var r = 0; r < NAME_PAIR_RULES.length; r++) {
          var nr = NAME_PAIR_RULES[r];
          var ra = normalize(nr.a), rb = normalize(nr.b);
          if ((n1 === ra && n2 === rb) || (n1 === rb && n2 === ra)) addInteraction(m1, m2, nr);
        }

        // Cada clase de m1 se compara contra cada clase de m2: esto detecta el riesgo de
        // interacción de cada principio activo de una combinación (ej. Sacubitrilo/Valsartán
        // aporta las clases ARNI y ARA II), no solo de la combinación como entidad opaca.
        for (var c = 0; c < CLASS_PAIR_RULES.length; c++) {
          var cr = CLASS_PAIR_RULES[c];
          var m1InA = m1.classes.some(function (cl) { return cr.a.indexOf(cl) !== -1; });
          var m2InB = m2.classes.some(function (cl) { return cr.b.indexOf(cl) !== -1; });
          var m1InB = m1.classes.some(function (cl) { return cr.b.indexOf(cl) !== -1; });
          var m2InA = m2.classes.some(function (cl) { return cr.a.indexOf(cl) !== -1; });
          if ((m1InA && m2InB) || (m1InB && m2InA)) addInteraction(m1, m2, cr);
        }

        // Duplicidad terapéutica: dos medicamentos DISTINTOS cuyo grupo ATC de 5 caracteres
        // (subgrupo químico) coincide no suman beneficio clínico relevante y sí aumentan el riesgo
        // de efectos adversos — es la primera pregunta al revisar un régimen de polifarmacia, y
        // CLASS_PAIR_RULES no la cubre porque solo compara clases DISTINTAS entre sí (a contra b),
        // nunca una clase contra sí misma. Se usa el grupo ATC (no la clase curada interna) porque es
        // un estándar externo, verificable y de cobertura más amplia — ver SUBSTANCE_ATC y la nota
        // metodológica en Referencias. Se excluyen los grupos de ATC5_DUPLICATION_EXEMPT, donde
        // combinar dos agentes del mismo subgrupo es terapia estándar respaldada por guías.
        var atc1 = getAtc5Set(m1.name), atc2 = getAtc5Set(m2.name);
        atc1.forEach(function (g) {
          if (ATC5_DUPLICATION_EXEMPT[g]) return;
          if (atc2.indexOf(g) === -1) return;
          var label = ATC5_LABELS[g] || g;
          addInteraction(m1, m2, {
            severity: "moderada",
            mechanism: "Duplicidad terapéutica (ambos son " + label + ", ATC " + g + ")",
            description: "Combinar dos medicamentos del mismo subgrupo ATC (" + label + ") generalmente no aporta beneficio aditivo relevante y sí incrementa el riesgo de efectos adversos.",
            recommendation: "Revisar si ambos son necesarios; considerar suspender uno o, si se requiere mayor efecto, cambiar a un agente de otro grupo en vez de sumar dos del mismo.",
            src: "Farmacología general — principio de duplicidad terapéutica, agrupado por subgrupo químico ATC (OMS ATC-DDD 2026-04-25); práctica estándar de revisión de medicación, no verificado contra un criterio numerado específico de STOPP/START"
          });
        });
      }
    }

    // Regla especial: "triple whammy" renal (IECA/ARA II + Diurético + AINE)
    function hasClass(m, cls) { return m.classes.indexOf(cls) !== -1; }
    var hasRAAS = meds.some(function (m) { return hasClass(m, "IECA") || hasClass(m, "ARAII"); });
    var diureticMed = meds.filter(function (m) { return hasClass(m, "Diuretico_Tiazidico") || hasClass(m, "Diuretico_Asa"); })[0];
    var aineMed = meds.filter(function (m) { return hasClass(m, "AINE"); })[0];
    var raasMed = meds.filter(function (m) { return hasClass(m, "IECA") || hasClass(m, "ARAII"); })[0];
    if (hasRAAS && diureticMed && aineMed) {
      // Si el mismo medicamento de combinación aporta tanto el IECA/ARA II como el diurético
      // (p. ej. "Enalapril/Hidroclorotiazida"), se muestra una sola vez en vez de duplicado.
      var raasLabel = (raasMed === diureticMed) ? raasMed.name : raasMed.name + " + " + diureticMed.name;
      interactions.push({
        med1: raasLabel, med2: aineMed.name, severity: "grave",
        mechanism: '"Triple whammy": hipoperfusión renal por bloqueo simultáneo del eje RAAS, depleción de volumen y prostaglandinas',
        description: "La combinación de un IECA/ARA II, un diurético y un AINE incrementa marcadamente el riesgo de lesión renal aguda.",
        recommendation: "Evitar la triple combinación, en especial en pacientes con ERC, deshidratación o edad avanzada.",
        src: GENERAL_SRC
      });
    }

    // LASA: tabla curada > similitud global fuerte (algorítmica) > patrón posicional (OMS 2023, Tabla 2)
    var lasa = [];
    var seenLasa = {};
    for (i = 0; i < meds.length; i++) {
      for (j = i + 1; j < meds.length; j++) {
        var med1 = meds[i], med2 = meds[j];
        var key2 = normalize(med1.name) + "|" + normalize(med2.name);
        if (seenLasa[key2]) continue;
        var matched = null;
        for (var k = 0; k < LASA_PAIRS.length; k++) {
          var lp = LASA_PAIRS[k];
          if ((normalize(lp.a) === normalize(med1.name) && normalize(lp.b) === normalize(med2.name)) ||
              (normalize(lp.b) === normalize(med1.name) && normalize(lp.a) === normalize(med2.name))) {
            matched = lp; break;
          }
        }
        if (matched) {
          var scoreMap = { Alto: 82, Medio: 58, Bajo: 28 };
          lasa.push({
            med1: med1.name, med2: med2.name, type: matched.type,
            score: scoreMap[matched.risk], level: matched.risk === "Alto" ? "high" : matched.risk === "Medio" ? "medium" : "low",
            source: "curada", src: matched.src || "ISMP 2023"
          });
          seenLasa[key2] = true;
        } else {
          var sim = similarity(med1.name, med2.name);
          if (sim >= 0.72) {
            var score = Math.round(sim * 100);
            lasa.push({
              med1: med1.name, med2: med2.name, type: "Ortográfica (algorítmica, Levenshtein)",
              score: score, level: levelFromScore(score), source: "algoritmo",
              src: "Similitud de cadenas — no listado por ISMP, verificar manualmente"
            });
            seenLasa[key2] = true;
          } else {
            var pat = lasaPatternMatch(med1.name, med2.name);
            if (pat) {
              lasa.push({
                med1: med1.name, med2: med2.name, type: "Ortográfica (patrón posicional — " + pat.mechanism + ")",
                score: pat.score, level: levelFromScore(pat.score), source: "patron",
                src: "OMS 2023, Tabla 2 (metodología de letras compartidas) — par no citado específicamente por la OMS; generado por regla derivada de su metodología, verificar manualmente"
              });
              seenLasa[key2] = true;
            }
          }
        }
      }
    }

    // Adherencia
    var nMeds = meds.length;
    var medsPts = nMeds <= 2 ? 0 : nMeds <= 5 ? 10 : nMeds <= 8 ? 20 : 30;

    var freqPoints = meds.map(function (m) {
      var f = FREQUENCIES.filter(function (x) { return x.v === m.freq; })[0];
      return f ? f.pts : 0;
    });
    var complexityPts = freqPoints.length ? Math.max.apply(null, freqPoints) : 0;
    var distinctFreqs = {};
    meds.forEach(function (m) { distinctFreqs[m.freq] = true; });
    if (Object.keys(distinctFreqs).length >= 3) complexityPts = Math.min(20, complexityPts + 5);

    var patientPts = 0;
    if ((patient.age || 0) > 75) patientPts += 5;
    if (patient.cognitiveImpairment) patientPts += 10;
    if (patient.conditions.indexOf("Depresion") !== -1) patientPts += 8;
    if (patient.lowEducation) patientPts += 5;
    if (patient.lowSocialSupport) patientPts += 7;

    var adherenceScore = Math.min(100, medsPts + complexityPts + patientPts);
    var adherenceFactors = [];
    if (nMeds > 2) adherenceFactors.push(nMeds + " medicamentos activos en el régimen");
    if (complexityPts >= 10) adherenceFactors.push("Régimen posológico complejo o con horarios irregulares");
    if ((patient.age || 0) > 75) adherenceFactors.push("Edad avanzada (>75 años)");
    if (patient.cognitiveImpairment) adherenceFactors.push("Deterioro cognitivo leve");
    if (patient.conditions.indexOf("Depresion") !== -1) adherenceFactors.push("Depresión/ansiedad no controlada");
    if (patient.lowEducation) adherenceFactors.push("Bajo nivel educativo");
    if (patient.lowSocialSupport) adherenceFactors.push("Falta de apoyo social o familiar");

    var adherenceRecs = [];
    if (adherenceScore > 60) {
      adherenceRecs.push("Revisión farmacéutica urgente y considerar desprescripción de fármacos no esenciales.");
      adherenceRecs.push("Intervención educativa intensiva y monitoreo frecuente del cumplimiento.");
    } else if (adherenceScore > 30) {
      adherenceRecs.push("Simplificar el régimen farmacológico cuando sea clínicamente posible.");
      adherenceRecs.push("Usar pastillero organizador o recordatorios de dosis.");
    } else {
      adherenceRecs.push("Mantener seguimiento habitual; refuerzo educativo básico sobre la importancia de la adherencia.");
    }

    // Puntuaciones agregadas e imagen global (sección 8.3 del modelo clínico)
    var graveCount = interactions.filter(function (x) { return x.severity === "grave"; }).length;
    var moderadaCount = interactions.filter(function (x) { return x.severity === "moderada"; }).length;
    var leveCount = interactions.filter(function (x) { return x.severity === "leve"; }).length;
    var interactionScore = Math.min(100, graveCount * 40 + moderadaCount * 20 + leveCount * 8);

    var lasaHigh = lasa.filter(function (x) { return x.level === "high"; }).length;
    var lasaMedium = lasa.filter(function (x) { return x.level === "medium"; }).length;
    var lasaLow = lasa.filter(function (x) { return x.level === "low"; }).length;
    var lasaScore = Math.min(100, lasaHigh * 35 + lasaMedium * 15 + lasaLow * 5);

    var overallScore, overallOverride = false;
    if (graveCount > 0) {
      overallScore = 100; overallOverride = true;
    } else {
      overallScore = Math.round(0.4 * interactionScore + 0.35 * adherenceScore + 0.25 * lasaScore);
    }

    return {
      meds: meds,
      interactions: interactions.sort(function (a, b) { return sevRank(b.severity) - sevRank(a.severity); }),
      lasa: lasa.sort(function (a, b) { return b.score - a.score; }),
      adherence: { score: adherenceScore, level: levelFromScore(adherenceScore), factors: adherenceFactors, recommendations: adherenceRecs },
      interactionScore: interactionScore, interactionLevel: levelFromScore(interactionScore),
      lasaScore: lasaScore, lasaLevel: levelFromScore(lasaScore),
      overallScore: overallScore, overallLevel: levelFromScore(overallScore), overallOverride: overallOverride,
      counts: { grave: graveCount, moderada: moderadaCount, leve: leveCount, lasaHigh: lasaHigh, lasaMedium: lasaMedium, lasaLow: lasaLow }
    };
  }

  function sevRank(s) { return s === "grave" ? 3 : s === "moderada" ? 2 : 1; }

  /* ---------------------------------------------------------------------
   * 4. ESTADO Y RENDER
   * ------------------------------------------------------------------- */

  var state = {
    view: "home",
    patient: null,
    analysis: null,
    detailTab: "interactions",
    draftMeds: [],
    medDraft: { name: "", dosage: "", freq: "1x", route: "oral", indication: "" },
    cumQuery: "",
    cumResults: []
  };

  function setView(v) { state.view = v; window.scrollTo({ top: 0, behavior: "auto" }); render(); }

  function loadPersona(id) {
    var p = PERSONAS.filter(function (x) { return x.id === id; })[0];
    if (!p) return;
    state.patient = {
      name: p.name, age: p.age, gender: p.gender, imc: p.imc, conditions: p.conditions.slice(),
      cognitiveImpairment: p.cognitiveImpairment, lowSocialSupport: p.lowSocialSupport, lowEducation: p.lowEducation,
      meds: p.meds.slice()
    };
    state.analysis = analyzePatient(state.patient);
    state.detailTab = "interactions";
    setView("results");
  }

  function startBlank() {
    state.draftMeds = [];
    state.medDraft = { name: "", dosage: "", freq: "1x", route: "oral", indication: "" };
    state.formConditions = [];
    setView("form");
  }

  function icon(name, size) {
    size = size || 18;
    var paths = {
      alert: '<path d="M12 3 2 20h20L12 3Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M12 9v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="17" r="0.9" fill="currentColor"/>',
      trend: '<path d="M3 17 9 11 13 15 21 6" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 6h6v6" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
      shield: '<path d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6l-8-3Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/>',
      check: '<path d="M4 12.5 9 17l11-11" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
      pill: '<rect x="3" y="9" width="18" height="6" rx="3" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M12 9v6" stroke="currentColor" stroke-width="1.6"/>',
      plus: '<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
      trash: '<path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 12a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',

  // Introducción: contexto clínico de los tres ejes de riesgo que evalúa la app y del fundamento de
  // los arquetipos de paciente, con citas Vancouver en superíndice.
  function renderIntro() {
    return "" +
      "<p>La polifarmacia en pacientes con multimorbilidad crónica se asocia a tres riesgos clínicos bien documentados. El " +
      "<b>riesgo de interacción farmacológica</b> crece de forma combinatoria con el número de medicamentos; esta aplicación evalúa cada par de fármacos del paciente contra una matriz de reglas fundamentada en los criterios STOPP/START versión 3" + cite(1) + ", los AGS Beers Criteria 2023" + cite(2) + " y las directrices de la OMS/OPS sobre comorbilidad física en trastornos mentales severos" + cite(3) + ", complementada con consenso farmacológico general" + cite([4, 5]) + ".</p>" +
      "<p>El <b>riesgo de no-adherencia terapéutica</b> aumenta con la carga de tratamiento y la complejidad posológica, factores descritos conceptualmente por la OMS" + cite(6) + " y por la guía de multimorbilidad de NICE" + cite(7) + ". Los pesos específicos del modelo de puntuación de esta app se apoyan en los predictores de adherencia identificados por Afkhami et al." + cite(8) + " (autoeficacia, alfabetización en salud, soporte familiar) y en la evidencia de que los productos de combinación en dosis fija mejoran la adherencia frente a la misma combinación en tabletas separadas" + cite(9) + ".</p>" +
      "<p>El <b>riesgo de confusión entre medicamentos</b> con nombre o aspecto similar (LASA, <i>look-alike, sound-alike</i>) es una causa reconocida de errores de medicación. La tabla de pares confundibles se fundamenta en la lista oficial del ISMP" + cite([10, 11]) + ", en un hallazgo de campo documentado en el contexto colombiano" + cite(12) + " — dado que el país no cuenta con un listado LASA oficial propio — y en la guía de la OMS sobre medicamentos LASA" + cite(13) + ".</p>" +
      "<p>Finalmente, los tres <b>arquetipos de paciente</b> que ofrece la app agrupan hipertensión arterial, diabetes mellitus tipo 2, obesidad, dislipidemia y, en un caso, enfermedad renal crónica — no de forma arbitraria, sino siguiendo el continuo cardiovascular-renal-metabólico (CKM) formalizado por la guía conjunta AHA/ACC/ADA/ASN 2026" + cite(14) + ".</p>";
  }

  // Materiales y métodos: descripción única y no redundante de cada componente del motor de riesgo.
  // Al editar, integrar hallazgos nuevos en el párrafo del componente correspondiente en vez de anexar
  // una nota metodológica nueva — evita que el texto crezca de forma redundante entre iteraciones.
  function renderMethods() {
    var cumCount = (typeof CUM_CATALOG !== "undefined") ? CUM_CATALOG.length : 0;
    return "" +
      "<h4>Clasificación de medicamentos</h4>" +
      "<p>El motor de riesgo clasifica cada medicamento por identidad de principio activo, no por nombre de producto ni por concentración. Los productos de combinación se descomponen por sus separadores habituales (\"/\" o \"+\") y cada componente se clasifica por separado contra un diccionario de ~90 principios activos curados, de modo que un mismo par de medicamentos puede activar más de una regla de interacción simultáneamente cuando ambos componentes de una combinación son clínicamente relevantes.</p>" +
      "<h4>Motor de interacciones</h4>" +
      "<p>Se generan todos los pares posibles de medicamentos del paciente (combinatoria N×(N−1)/2) y se comparan contra una matriz de reglas por clase farmacológica y por nombre exacto, fundamentada según se describe en la Introducción" + cite([1, 2, 3, 4, 5]) + ". Una regla especial de tres fármacos (\"triple whammy\": IECA/ARA-II + diurético + AINE) se evalúa aparte; está ampliamente documentada en farmacovigilancia, pero no corresponde a un criterio STOPP/START único.</p>" +
      "<h4>Duplicidad terapéutica por grupo ATC</h4>" +
      "<p>Además de las interacciones entre clases distintas, el motor detecta cuando dos medicamentos pertenecen al mismo subgrupo químico ATC (los primeros 5 caracteres del código, p. ej. \"A10BK\" para inhibidores de SGLT2) — un escenario de sobreprescripción sin beneficio aditivo demostrado que una matriz de reglas por clases distintas no puede capturar por diseño. El código ATC no se toma directamente del catálogo CUM, porque ese campo refleja el producto registrado ante INVIMA — que puede ser una combinación de dosis fija — y no el principio activo individual; asignarlo tal cual reintroduciría el problema que la descomposición de combinaciones busca evitar. En su lugar se construyó un mapa de ~80 principios activos verificado manualmente contra el índice oficial OMS ATC-DDD" + cite(16) + ", corrigiendo los casos en que la primera coincidencia automática correspondía a una combinación o a una vía de administración distinta de la usada en esta app (p. ej. formulaciones nasales o parenterales en vez de las orales/inhaladas empleadas aquí). Se excluyen de la regla los subgrupos donde combinar dos agentes es terapia estándar: beta-2 agonistas de acción corta y prolongada, anticolinérgicos inhalados de acción corta y prolongada, doble antiagregación tras síndrome coronario agudo, e inhibidores de PCSK9 con ezetimiba — estos dos últimos agrupados por la OMS en el mismo subgrupo de 5 caracteres pese a tener mecanismos complementarios que se combinan a propósito en hipercolesterolemia refractaria. Un efecto colateral de usar el ATC en vez de la clase curada interna: la OMS clasifica a la Tirzepatida (agonista dual GIP/GLP-1) en un subgrupo distinto al de los agonistas GLP-1 puros (Semaglutida, Dulaglutida), por lo que la duplicidad entre ellos no se detecta pese a que la clase curada interna los agrupa juntos — la misma divergencia de tipo que ya existía entre Codeína y Tramadol. El mapeo cubre actualmente los principios activos curados que alimentan el motor de clasificación, no la totalidad del catálogo CUM.</p>" +
      "<h4>Detección de medicamentos LASA</h4>" +
      "<p>Se combinan tres capas de detección, en orden de prioridad: (1) una tabla curada de pares verificados contra el ISMP" + cite([10, 11]) + ", un hallazgo de campo colombiano" + cite(12) + " y la guía OMS 2023" + cite(13) + "; (2) un algoritmo de similitud de cadenas (distancia de Levenshtein, umbral ≥0,72) para pares no catalogados; y (3) una regla derivada que generaliza el mecanismo de letras compartidas al inicio o al final del nombre que documenta la OMS" + cite(13) + ", calibrada empíricamente (prefijo ≥2 letras y similitud ≥0,38, o sufijo ≥4 letras y similitud ≥0,45) para extender la detección a casos estructuralmente análogos no citados textualmente por la fuente, sin generar falsos positivos por sufijos morfológicos genéricos del español (p. ej. \"-tina\", común a estatinas y gliptinas).</p>" +
      "<h4>Catálogo de medicamentos (CUM)</h4>" +
      "<p>El buscador de medicamentos se reconstruyó a partir de las 121.728 filas vigentes/activas del catálogo oficial de INVIMA" + cite(15) + ", deduplicado por el par (nombre comercial, principio activo) tras remover concentración y forma de sal de ambos campos — una simplificación deliberada, ya que el riesgo de interacción depende de la identidad del principio activo y no de su dosis. El resultado son " + cumCount + " registros buscables tanto por marca como por principio activo.</p>" +
      "<h4>Puntuación de riesgo de adherencia</h4>" +
      "<p>Es un modelo heurístico propio (número de medicamentos, complejidad posológica, factores del paciente), inspirado conceptualmente en la OMS" + cite(6) + " y NICE" + cite(7) + " y calibrado con los predictores identificados por Afkhami et al." + cite(8) + ", pero no es un instrumento validado externamente. Los productos de combinación cuentan como un solo medicamento en este modelo, lo que captura correctamente su menor carga de pastillas frente a los mismos principios activos por separado" + cite(9) + " — el mismo atributo que aumenta el riesgo de interacción (más principios activos evaluados por separado) reduce el riesgo de no-adherencia.</p>" +
      "<h4>Limitaciones generales</h4>" +
      "<p>El motor de clases e interacciones cubre ~90 principios activos curados; un medicamento fuera de ese conjunto participa solo en las reglas de nombre exacto. Las reglas marcadas \"farmacología general\" no tienen un criterio numerado exacto verificado contra STOPP/START v3" + cite(1) + ", Beers 2023" + cite(2) + " o el Anexo 6 OMS/OPS" + cite(3) + ". La fórmula de adherencia y el modelo de agregación de riesgo global son heurísticos propios sin validación clínica prospectiva.</p>";
  }

  // Busca tanto por principio activo (n) como por nombre comercial (p), ya que en la práctica
  // clínica suele conocerse la marca y no el principio activo. La coincidencia por inicio de
  // palabra se prioriza sobre la coincidencia parcial en cualquiera de los dos campos.
  function searchCum(query) {
    if (typeof CUM_CATALOG === "undefined" || !query || query.trim().length < 2) return [];
    var q = normalize(query.trim());
    var starts = [], includes = [];
    for (var i = 0; i < CUM_CATALOG.length; i++) {
      var entry = CUM_CATALOG[i];
      var n = normalize(entry.n), p = normalize(entry.p || "");
      if (n.indexOf(q) === 0 || p.indexOf(q) === 0) starts.push(entry);
      else if (n.indexOf(q) !== -1 || p.indexOf(q) !== -1) includes.push(entry);
      if (starts.length >= 25) break;
    }
    return starts.concat(includes).slice(0, 25);
  }

  function renderStepsStrip() {
    var steps = [
      "Elige un arquetipo o crea un paciente nuevo",
      "Marca condiciones crónicas — se listan los medicamentos más frecuentes",
      "Selecciona los medicamentos con un clic (dosis habitual precargada)",
      "Analiza y revisa el riesgo con la evidencia citada"
    ];
    return '<div class="steps-strip">' + steps.map(function (s, i) {
      return '<div class="step-item"><span class="step-num">' + (i + 1) + "</span><span>" + s + "</span></div>";
    }).join("") + "</div>";
  }

  function isMedInDraft(name) {
    var n = normalize(name);
    return state.draftMeds.some(function (m) { return normalize(m.name) === n; });
  }

  function renderQuickPicks() {
    if (!state.formConditions || state.formConditions.length === 0) {
      return '<p class="quick-pick-hint">Selecciona una o más condiciones crónicas arriba para ver aquí sus medicamentos más frecuentes, con dosis habitual lista para agregar con un clic.</p>';
    }
    return state.formConditions.map(function (condId) {
      var meds = MED_CATALOG[condId] || [];
      if (meds.length === 0) return "";
      var byClass = {};
      var order = [];
      meds.forEach(function (m) {
        if (!byClass[m.cls]) { byClass[m.cls] = []; order.push(m.cls); }
        byClass[m.cls].push(m);
      });
      var condLabel = CONDITIONS.filter(function (c) { return c.id === condId; })[0];
      var classBlocks = order.map(function (cls) {
        var rows = byClass[cls].map(function (m) {
          var checked = isMedInDraft(m.name);
          var freqLabel = (FREQUENCIES.filter(function (f) { return f.v === m.freq; })[0] || {}).label || "";
          return '<label class="quick-row ' + (checked ? "checked" : "") + '">' +
            '<input type="checkbox" ' + (checked ? "checked" : "") + ' onchange="PolifarmaRisk.toggleQuickMed(\'' + condId + "', '" + m.name.replace(/'/g, "\\'") + '\')"/>' +
            "<span>" + escapeHtml(m.name) + '</span><span class="quick-dose">' + escapeHtml(m.dosage) + (freqLabel ? " · " + freqLabel : "") + "</span>" +
            "</label>";
        }).join("");
        return '<div class="quick-class-title">' + withAbbr(CLASS_LABELS[cls] || cls) + '</div><div class="quick-rows">' + rows + "</div>";
      }).join("");
      return '<div class="quick-group"><div class="quick-group-title">' + withAbbr(condLabel ? condLabel.label : condId) + "</div>" + classBlocks + "</div>";
    }).join("");
  }

  function renderCumBox() {
    if (typeof CUM_CATALOG === "undefined") return "";
    var query = state.cumQuery || "";
    state.cumResults = searchCum(query);
    var resultsHtml = state.cumResults.map(function (r, idx) {
      return '<div class="cum-item"><div><div class="cum-item-name">' + escapeHtml(r.n) + (r.p ? ' <span class="cum-item-brand">(' + escapeHtml(r.p) + ')</span>' : '') + '</div>' +
        '<div class="cum-item-meta">' + escapeHtml(r.atc || "—") + " · " + escapeHtml(r.d || "") + " · " + escapeHtml(r.r || "") + "</div></div>" +
        '<button type="button" class="btn btn-ghost btn-sm" onclick="PolifarmaRisk.useCumEntry(' + idx + ')">Usar</button></div>';
    }).join("");
    var countLabel = query.trim().length < 2
      ? '<p class="cum-count">Escribe al menos 2 caracteres para buscar.</p>'
      : '<p class="cum-count">' + state.cumResults.length + (state.cumResults.length === 25 ? "+ " : " ") + "resultado" + (state.cumResults.length === 1 ? "" : "s") + " sobre " + CUM_CATALOG.length + " registros vigentes (marca + principio activo).</p>";
    return '' +
      '<div class="cum-box">' +
      '<p class="subtle-title">Buscar en el catálogo oficial (CUM)</p>' +
      '<p class="cum-source">Registros vigentes del INVIMA, vía <a href="https://www.datos.gov.co/Salud-y-Protecci-n-Social/C-DIGO-NICO-DE-MEDICAMENTOS-VIGENTES/i7cb-raxc/about_data" target="_blank" rel="noopener">datos.gov.co — Código Único de Medicamentos</a>. Se agrega el medicamento por su principio activo (el nombre comercial se muestra entre paréntesis solo como referencia); si es un producto de combinación, revisa si aparece en más de un registro y agrégalos por separado.</p>' +
      '<div class="field"><input id="cum-search" placeholder="Ej. losartán, Cozaar, metformina…" value="' + escapeHtml(query) + '" oninput="PolifarmaRisk.setCumQuery(this.value)"/></div>' +
      countLabel +
      '<div class="cum-results">' + resultsHtml + "</div>" +
      "</div>";
  }

  function renderResults() {
    var a = state.analysis, p = state.patient;
    if (!a) return '<div class="container" style="padding:60px 0;">Sin análisis disponible.</div>';

    var summary = '' +
      '<div class="summary-grid">' +
      riskCard("Interacciones medicamentosas", a.interactionScore, a.interactionLevel, a.counts.grave + " grave · " + a.counts.moderada + " moderada · " + a.counts.leve + " leve") +
      riskCard("Riesgo de adherencia", a.adherence.score, a.adherence.level, a.adherence.factors.length + " factores contribuyentes") +
      riskCard("Confusión LASA", a.lasaScore, a.lasaLevel, a.counts.lasaHigh + " alto · " + a.counts.lasaMedium + " medio · " + a.counts.lasaLow + " bajo") +
      "</div>";

    var overall = '' +
      '<div class="overall-banner" style="background:var(--risk-' + a.overallLevel + '-bg);border-color:var(--risk-' + a.overallLevel + ');">' +
      '<div><div class="label">Riesgo global del paciente</div>' +
      '<div class="value" style="color:var(--risk-' + a.overallLevel + ')">' + levelLabel(a.overallLevel) + " · " + a.overallScore + "/100</div>" +
      (a.overallOverride ? '<p style="margin:6px 0 0;font-size:0.82rem;color:var(--text-muted);">Elevado automáticamente por regla de anulación: existe al menos una interacción grave.</p>' : "") +
      "</div>" +
      '<button class="btn btn-ghost" onclick="PolifarmaRisk.exportReport()">Exportar / imprimir reporte</button>' +
      "</div>";

    var tabs = [
      { id: "interactions", label: "Interacciones (" + a.interactions.length + ")" },
      { id: "lasa", label: "LASA (" + a.lasa.length + ")" },
      { id: "adherence", label: "Adherencia" },
      { id: "recs", label: "Recomendaciones" }
    ].map(function (t) {
      return '<button class="' + (state.detailTab === t.id ? "active" : "") + '" onclick="PolifarmaRisk.setDetailTab(\'' + t.id + '\')">' + t.label + "</button>";
    }).join("");

    var interactionsBody = a.interactions.length ? a.interactions.map(function (x) {
      return '<div class="finding" style="--stripe:' + stripeVar(x.severity === "grave" ? "high" : x.severity === "moderada" ? "medium" : "low") + ';">' +
        '<div class="finding-head"><span class="finding-pair">' + escapeHtml(x.med1) + " + " + escapeHtml(x.med2) + "</span>" +
        pill(x.severity === "grave" ? "high" : x.severity === "moderada" ? "medium" : "low") + "</div>" +
        '<p class="finding-mech">' + withAbbr(x.mechanism) + "</p>" +
        "<p>" + withAbbr(x.description) + "</p>" +
        '<div class="finding-reco"><b>Recomendación:</b> ' + withAbbr(x.recommendation) + "</div>" +
        '<p style="margin:8px 0 0;font-size:0.74rem;color:var(--text-muted);">Fuente: ' + escapeHtml(x.src || "sin verificar") + "</p></div>";
    }).join("") : emptyState("No se detectaron interacciones medicamentosas relevantes.");

    var lasaBody = a.lasa.length ? a.lasa.map(function (x) {
      return '<div class="finding" style="--stripe:' + stripeVar(x.level) + ';">' +
        '<div class="finding-head"><span class="finding-pair">' + escapeHtml(x.med1) + " ↔ " + escapeHtml(x.med2) + "</span>" + pill(x.level) + "</div>" +
        '<p class="finding-mech">Similitud ' + escapeHtml(x.type) + " · puntuación " + x.score + "/100 · fuente: " + escapeHtml(x.src || "sin verificar") + "</p>" +
        '<div class="finding-reco"><b>Medida de seguridad:</b> Usar nombres genéricos en la prescripción; almacenar y etiquetar por separado; alertar en dispensación.</div></div>';
    }).join("") : emptyState("No se detectaron pares de medicamentos con riesgo de confusión (LASA).");

    var adherenceBody = '<div class="card card-pad">' +
      '<p class="subtle-title">Factores contribuyentes</p>' +
      (a.adherence.factors.length ? a.adherence.factors.map(function (f) {
        return '<div class="rec-item">' + icon("alert", 16) + "<span>" + withAbbr(f) + "</span></div>";
      }).join("") : '<p style="color:var(--text-muted);">Sin factores adicionales relevantes.</p>') +
      '<p class="subtle-title" style="margin-top:18px;">Recomendaciones</p>' +
      a.adherence.recommendations.map(function (r) {
        return '<div class="rec-item">' + icon("check", 16) + "<span>" + withAbbr(r) + "</span></div>";
      }).join("") +
      "</div>";

    var allRecs = a.adherence.recommendations.concat([
      "Revisar la necesidad de cada medicamento y considerar deprescripción cuando corresponda.",
      "Educar al paciente sobre la importancia de la adherencia y el reconocimiento de efectos adversos.",
      "Monitoreo periódico de función renal/hepática y de la respuesta terapéutica.",
      "Implementar medidas de seguridad para prevenir errores de medicación (nombres genéricos, doble verificación)."
    ]);
    var recsBody = '<div class="card card-pad">' + allRecs.map(function (r) {
      return '<div class="rec-item">' + icon("check", 16) + "<span>" + withAbbr(r) + "</span></div>";
    }).join("") + "</div>";

    var panels = [
      { id: "interactions", title: "Interacciones medicamentosas", html: interactionsBody },
      { id: "lasa", title: "Confusión de medicamentos (LASA)", html: lasaBody },
      { id: "adherence", title: "Riesgo de adherencia", html: adherenceBody },
      { id: "recs", title: "Recomendaciones", html: recsBody }
    ];
    var body = panels.map(function (pnl) {
      return '<div class="tab-panel' + (state.detailTab === pnl.id ? " active" : "") + '" data-tab="' + pnl.id + '">' +
        '<h3 class="print-only-title">' + pnl.title + "</h3>" + pnl.html + "</div>";
    }).join("");

    var medList = a.meds.map(function (m) {
      var classLabel = (m.classes && m.classes.length)
        ? m.classes.map(function (c) { return CLASS_LABELS[c] || c; }).join(" + ")
        : "Sin clasificar";
      return '<div class="med-row"><div><div class="med-name">' + escapeHtml(m.name) + '</div><div class="med-detail">' +
        escapeHtml(m.dosage || "—") + " · " + escapeHtml(m.indication || "") + "</div></div>" +
        '<span class="tag">' + withAbbr(classLabel) + "</span></div>";
    }).join("");

    return '' +
      '<section class="container" style="padding-top:36px;">' +
      '<div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:24px;">' +
      '<div><h2 class="section-title" style="margin-bottom:2px;">Resultados — ' + escapeHtml(p.name || "Paciente") + "</h2>" +
      '<p class="section-sub" style="margin:0;">' + (p.age ? p.age + " años · " : "") + p.conditions.length + " condiciones crónicas · " + a.meds.length + " medicamentos</p></div>" +
      '<div style="display:flex;gap:8px;">' +
      '<button class="btn btn-ghost btn-sm" onclick="PolifarmaRisk.goToReferences()">Metodología y referencias</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="PolifarmaRisk.startBlank()">Nuevo análisis</button>' +
      "</div>" +
      "</div>" +
      summary + overall +
      '<div class="card card-pad" style="margin-bottom:24px;"><p class="subtle-title">Medicamentos analizados</p><div class="med-list">' + medList + "</div></div>" +
      '<div class="detail-tabs">' + tabs + "</div>" +
      body +
      '<div class="print-methodology">' +
      '<h3 class="print-only-title">Materiales y métodos</h3>' +
      '<p style="font-size:0.8rem;color:var(--text-muted);margin:0 0 14px;">Cada hallazgo de este informe cita su fuente ("Fuente: ...") junto a la recomendación. Detalle metodológico y bibliografía completa (formato Vancouver) a continuación.</p>' +
      '<div class="sci-toggle-body" style="padding:0;">' + renderMethods() + "</div>" +
      '<h3 class="print-only-title">Referencias</h3>' +
      renderReferenceList() +
      "</div>" +
      "</section>";
  }

  function riskCard(title, score, level, sub) {
    return '' +
      '<div class="risk-card" style="--stripe:' + stripeVar(level) + ';">' +
      "<h4>" + title + "</h4>" +
      '<div class="risk-score">' + score + '<span style="font-size:1rem;color:var(--text-muted);"> /100</span></div>' +
      '<div class="meter"><span style="width:' + score + "%;background:" + stripeVar(level) + ';"></span></div>' +
      pill(level) + '<p style="margin:10px 0 0;font-size:0.8rem;color:var(--text-muted);">' + sub + "</p>" +
      "</div>";
  }

  function emptyState(msg) {
    return '<div class="empty-state">' + icon("check", 18) + "<span>" + msg + "</span></div>";
  }

  function render() {
    var html = header();
    if (state.view === "home") html += renderHome();
    else if (state.view === "form") html += renderForm();
    else if (state.view === "results") html += renderResults();
    html += footer();
    document.getElementById("app").innerHTML = html;
  }

  /* ---------------------------------------------------------------------
   * 5. ACCIONES
   * ------------------------------------------------------------------- */

  function toggleCondition(id) {
    if (!state.formConditions) state.formConditions = [];
    var idx = state.formConditions.indexOf(id);
    if (idx === -1) state.formConditions.push(id); else state.formConditions.splice(idx, 1);
    render();
  }

  function toggleQuickMed(condId, medName) {
    var n = normalize(medName);
    var existingIdx = -1;
    for (var i = 0; i < state.draftMeds.length; i++) {
      if (normalize(state.draftMeds[i].name) === n) { existingIdx = i; break; }
    }
    if (existingIdx !== -1) {
      state.draftMeds.splice(existingIdx, 1);
    } else {
      var entry = (MED_CATALOG[condId] || []).filter(function (m) { return normalize(m.name) === n; })[0];
      if (!entry) return;
      var condLabel = CONDITIONS.filter(function (c) { return c.id === condId; })[0];
      state.draftMeds.push({
        name: entry.name, dosage: entry.dosage, freq: entry.freq || "1x",
        route: entry.route || "oral", indication: condLabel ? condLabel.label : condId
      });
    }
    render();
  }

  function addDraftMed() {
    var name = document.getElementById("m-name").value.trim();
    if (!name) { toast("Ingresa el nombre del medicamento"); return; }
    state.draftMeds.push({
      name: name,
      dosage: document.getElementById("m-dosage").value.trim(),
      freq: document.getElementById("m-freq").value,
      route: document.getElementById("m-route").value,
      indication: document.getElementById("m-indication").value.trim()
    });
    state.medDraft = { name: "", dosage: "", freq: "1x", route: "oral", indication: "" };
    render();
    toast("Medicamento agregado");
  }

  function removeDraftMed(idx) {
    state.draftMeds.splice(idx, 1);
    render();
  }

  function runAnalysis() {
    var name = document.getElementById("f-name").value.trim() || "Paciente sin nombre";
    if (state.draftMeds.length === 0) { toast("Agrega al menos un medicamento"); return; }
    if (!state.formConditions || state.formConditions.length === 0) { toast("Selecciona al menos una condición crónica"); return; }

    state.patient = {
      name: name,
      age: parseInt(document.getElementById("f-age").value, 10) || null,
      gender: document.getElementById("f-gender").value,
      imc: document.getElementById("f-imc").value.trim(),
      conditions: state.formConditions.slice(),
      cognitiveImpairment: document.getElementById("f-cog").checked,
      lowEducation: document.getElementById("f-edu").checked,
      lowSocialSupport: document.getElementById("f-support").checked,
      meds: state.draftMeds.slice()
    };
    state.analysis = analyzePatient(state.patient);
    state.detailTab = "interactions";
    setView("results");
  }

  function setDetailTab(id) { state.detailTab = id; render(); }

  function goToReferences() {
    state.view = "home";
    render();
    var el = document.getElementById("referencias");
    if (el) {
      el.querySelectorAll(".sci-toggle").forEach(function (d) { d.open = true; });
      el.scrollIntoView({ behavior: "smooth" });
    }
  }

  function exportReport() {
    try {
      if (typeof window.print !== "function") throw new Error("print no disponible");
      window.print();
    } catch (e) {
      toast("Tu navegador bloqueó la impresión aquí. Abre la app en una pestaña normal (no dentro de una vista incrustada) e intenta de nuevo, o usa Ctrl/Cmd+P.");
    }
  }

  function setCumQuery(value) {
    state.cumQuery = value;
    render();
    var input = document.getElementById("cum-search");
    if (input) {
      input.focus();
      var pos = input.value.length;
      input.setSelectionRange(pos, pos);
    }
  }

  function useCumEntry(idx) {
    var entry = (state.cumResults || [])[idx];
    if (!entry) return;
    document.getElementById("m-name").value = entry.n;
    document.getElementById("m-indication").value = entry.d || "";
    var routes = (entry.r || "").split("|");
    var routeSelect = document.getElementById("m-route");
    if (routes.indexOf("INHALATORIA") !== -1 || routes.indexOf("INHALADA") !== -1) routeSelect.value = "inhalation";
    else if (routes.indexOf("TOPICA") !== -1 || routes.indexOf("TÓPICA") !== -1) routeSelect.value = "topical";
    else if (routes.indexOf("ORAL") !== -1) routeSelect.value = "oral";
    document.getElementById("m-name").focus();
    toast("Datos cargados desde el catálogo CUM");
  }

  window.PolifarmaRisk = {
    setView: setView, loadPersona: loadPersona, startBlank: startBlank,
    toggleCondition: toggleCondition, toggleQuickMed: toggleQuickMed, addDraftMed: addDraftMed, removeDraftMed: removeDraftMed,
    runAnalysis: runAnalysis, setDetailTab: setDetailTab, setCumQuery: setCumQuery, useCumEntry: useCumEntry,
    goToReferences: goToReferences, exportReport: exportReport
  };

  state.formConditions = [];
  render();
})();
</script>

</body>
</html>
