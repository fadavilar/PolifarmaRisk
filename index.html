<body>
<style>
  :root {
    --bg: #F2F5F4;
    --surface: #FFFFFF;
    --surface-2: #E7ECEA;
    --text: #10201E;
    --text-muted: #4B615D;
    --accent: #0F6E6A;
    --accent-strong: #0B4F4C;
    --accent-soft: #DCEEEC;
    --border: #D3DBD8;
    --risk-low: #256B4E; --risk-low-bg: #E3F1E9;
    --risk-medium: #97650A; --risk-medium-bg: #FBF0DC;
    --risk-high: #A93A32; --risk-high-bg: #FBE7E4;
    --shadow: 0 1px 2px rgba(16,32,30,0.07), 0 10px 28px -14px rgba(16,32,30,0.22);
    --font-display: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0B1615; --surface:#11201E; --surface-2:#172926; --text:#EAF1EF; --text-muted:#9FB5B0;
      --accent:#4FC3B8; --accent-strong:#8FE4D9; --accent-soft:#173330; --border:#24403C;
      --risk-low:#5FCB93; --risk-low-bg:#0F2A1E;
      --risk-medium:#E3B25C; --risk-medium-bg:#31260F;
      --risk-high:#E67C71; --risk-high-bg:#331714;
      --shadow: 0 1px 2px rgba(0,0,0,0.5), 0 10px 28px -14px rgba(0,0,0,0.65);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg:#0B1615; --surface:#11201E; --surface-2:#172926; --text:#EAF1EF; --text-muted:#9FB5B0;
    --accent:#4FC3B8; --accent-strong:#8FE4D9; --accent-soft:#173330; --border:#24403C;
    --risk-low:#5FCB93; --risk-low-bg:#0F2A1E;
    --risk-medium:#E3B25C; --risk-medium-bg:#31260F;
    --risk-high:#E67C71; --risk-high-bg:#331714;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #F2F5F4; --surface: #FFFFFF; --surface-2: #E7ECEA; --text: #10201E; --text-muted: #4B615D;
    --accent: #0F6E6A; --accent-strong: #0B4F4C; --accent-soft: #DCEEEC; --border: #D3DBD8;
    --risk-low: #256B4E; --risk-low-bg: #E3F1E9;
    --risk-medium: #97650A; --risk-medium-bg: #FBF0DC;
    --risk-high: #A93A32; --risk-high-bg: #FBE7E4;
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100vh; }
  a { color: var(--accent-strong); }
  abbr[title] { text-decoration: underline dotted; text-underline-offset: 2px; cursor: help; }
  button { font-family: inherit; cursor: pointer; }
  button:focus-visible, [tabindex]:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  .site-header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .site-header .container { display:flex; align-items:center; justify-content:space-between; height: 64px; gap: 16px; }
  .brand { display:flex; align-items:baseline; gap:8px; font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; letter-spacing: 0.01em; }
  .brand small { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  nav.tabs { display:flex; gap: 4px; background: var(--surface-2); padding: 4px; border-radius: 10px; }
  nav.tabs button {
    border:none; background: transparent; color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
    padding: 8px 14px; border-radius: 7px; transition: background .15s, color .15s;
  }
  nav.tabs button.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  nav.tabs button:disabled { opacity: 0.4; cursor: not-allowed; }

  .hero { padding: 72px 0 48px; }
  .eyebrow { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.72rem; color: var(--accent-strong); margin: 0 0 14px; }
  h1.display { font-family: var(--font-display); font-size: clamp(2.1rem, 4vw, 3.1rem); line-height: 1.12; margin: 0 0 20px; text-wrap: balance; font-weight: 600; }
  .lede { font-size: 1.08rem; color: var(--text-muted); max-width: 60ch; margin: 0 0 28px; }
  .btn { display:inline-flex; align-items:center; gap:8px; border-radius: 9px; padding: 11px 20px; font-size: 0.92rem; font-weight: 600; border: 1px solid transparent; transition: transform .1s, box-shadow .15s, background .15s; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-strong); }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent-strong); }
  .btn-sm { padding: 7px 12px; font-size: 0.8rem; }
  .btn-danger-ghost { background: transparent; color: var(--risk-high); border: 1px solid transparent; }
  .btn-danger-ghost:hover { background: var(--risk-high-bg); }

  section { padding: 40px 0; }
  h2.section-title { font-family: var(--font-display); font-size: 1.7rem; margin: 0 0 6px; font-weight: 600; }
  p.section-sub { color: var(--text-muted); margin: 0 0 28px; max-width: 62ch; }

  .persona-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .persona-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; box-shadow: var(--shadow); display:flex; flex-direction:column; gap: 14px; }
  .persona-head { display:flex; align-items:center; gap: 14px; }
  .persona-avatar { width:48px; height:48px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-strong); display:flex; align-items:center; justify-content:center; font-family: var(--font-display); font-weight:700; font-size:1.1rem; flex-shrink:0; }
  .persona-name { font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; margin:0; }
  .persona-meta { color: var(--text-muted); font-size: 0.82rem; margin: 2px 0 0; }
  .persona-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size: 0.72rem; background: var(--surface-2); color: var(--text-muted); padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border); }
  .persona-foot { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 0.8rem; color: var(--text-muted); }

  .feature-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 18px; }
  .feature-card { background: var(--surface); border:1px solid var(--border); border-radius: 14px; padding: 20px; }
  .feature-icon { width: 38px; height:38px; border-radius: 10px; background: var(--accent-soft); color: var(--accent-strong); display:flex; align-items:center; justify-content:center; margin-bottom: 12px; }
  .feature-card h3 { font-size: 1rem; margin: 0 0 6px; }
  .feature-card p { font-size: 0.86rem; color: var(--text-muted); margin:0; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); }
  .card-pad { padding: 22px; }
  .card + .card { margin-top: 18px; }
  .form-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; }
  .field label { display:block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
  .field input, .field select, .field textarea {
    width:100%; padding: 9px 11px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.92rem; font-family: inherit;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .checklist { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 10px; }
  .check-row { display:flex; align-items:flex-start; gap:9px; font-size: 0.88rem; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; }
  .check-row input { margin-top: 3px; }
  .check-row.checked { border-color: var(--accent); background: var(--accent-soft); }
  .subtle-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 0 0 12px; }

  .med-picker { display:grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 12px; align-items:end; }
  .med-list { display:flex; flex-direction:column; gap: 8px; margin-top: 16px; }

  .cum-box { margin-top: 22px; padding-top: 18px; border-top: 1px dashed var(--border); }
  .cum-source { font-size: 0.76rem; color: var(--text-muted); margin: 4px 0 12px; }
  .cum-source a { color: var(--accent-strong); }
  .cum-results { display:flex; flex-direction:column; gap: 6px; max-height: 260px; overflow-y: auto; margin-top: 10px; }
  .cum-item { display:flex; align-items:center; justify-content:space-between; gap: 12px; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
  .cum-item-name { font-size: 0.86rem; font-weight: 600; }
  .cum-item-brand { font-weight: 400; color: var(--text-muted); }
  .cum-item-meta { font-size: 0.74rem; color: var(--text-muted); font-family: var(--font-mono); }
  .cum-count { font-size: 0.76rem; color: var(--text-muted); margin-top: 8px; }

  .steps-strip { display:flex; flex-wrap:wrap; gap: 18px; background: var(--accent-soft); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 22px; }
  .step-item { display:flex; align-items:center; gap: 8px; font-size: 0.82rem; color: var(--text); }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .quick-pick-hint { font-size: 0.85rem; color: var(--text-muted); padding: 12px 14px; background: var(--bg); border: 1px dashed var(--border); border-radius: 9px; margin-bottom: 4px; }
  .quick-group { margin-bottom: 16px; }
  .quick-group-title { font-size: 0.82rem; font-weight: 700; margin: 14px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .quick-class-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin: 10px 0 6px; }
  .quick-rows { display:grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 8px; }
  .quick-row { display:flex; align-items:center; gap: 8px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 0.84rem; cursor: pointer; }
  .quick-row.checked { border-color: var(--accent); background: var(--accent-soft); }
  .quick-row input { flex-shrink: 0; }
  .quick-row .quick-dose { margin-left: auto; font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

  .refs-section { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 18px; }
  .refs-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .refs-card h3 { font-size: 0.95rem; margin: 0 0 12px; }
  .refs-card ol { margin: 0; padding-left: 18px; display:flex; flex-direction:column; gap: 8px; }
  .refs-card li { font-size: 0.82rem; color: var(--text-muted); line-height: 1.45; }
  .refs-card li a { font-weight: 600; }
  .med-row { display:flex; align-items:center; justify-content:space-between; gap: 12px; padding: 10px 14px; background: var(--bg); border:1px solid var(--border); border-radius: 9px; }
  .med-row .med-name { font-weight: 600; font-size: 0.9rem; }
  .med-row .med-detail { font-size: 0.78rem; color: var(--text-muted); font-family: var(--font-mono); }

  .summary-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 18px; margin-bottom: 18px; }
  .risk-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); position:relative; overflow:hidden; }
  .risk-card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--stripe, var(--border)); }
  .risk-card h4 { margin: 0 0 4px; font-size: 0.85rem; color: var(--text-muted); font-weight:600; }
  .risk-score { font-family: var(--font-display); font-size: 2.2rem; font-weight: 700; margin: 2px 0 8px; font-variant-numeric: tabular-nums; }
  .meter { height: 8px; border-radius: 999px; background: var(--surface-2); overflow:hidden; margin-bottom: 10px; }
  .meter > span { display:block; height:100%; border-radius: 999px; }
  .pill { display:inline-flex; align-items:center; gap:6px; font-size: 0.74rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em; }
  .pill-low { background: var(--risk-low-bg); color: var(--risk-low); }
  .pill-medium { background: var(--risk-medium-bg); color: var(--risk-medium); }
  .pill-high { background: var(--risk-high-bg); color: var(--risk-high); }

  .overall-banner { display:flex; align-items:center; justify-content:space-between; gap: 20px; flex-wrap:wrap; padding: 26px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; }
  .overall-banner .label { font-family: var(--font-mono); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
  .overall-banner .value { font-family: var(--font-display); font-size: 1.9rem; font-weight: 700; }

  .detail-tabs { display:flex; gap: 6px; margin-bottom: 18px; flex-wrap:wrap; border-bottom: 1px solid var(--border); }
  .detail-tabs button { background:none; border:none; padding: 10px 4px; margin-right: 18px; font-size: 0.88rem; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; }
  .detail-tabs button.active { color: var(--text); border-bottom-color: var(--accent); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .print-only-title { display: none; }
  .print-methodology { display: none; }

  .finding { border: 1px solid var(--border); border-left: 4px solid var(--stripe, var(--border)); border-radius: 10px; padding: 16px 18px; background: var(--surface); margin-bottom: 12px; }
  .finding-head { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .finding-pair { font-weight: 700; font-size: 0.98rem; }
  .finding-mech { color: var(--text-muted); font-size: 0.82rem; margin: 0 0 10px; }
  .finding-reco { background: var(--accent-soft); border-radius: 8px; padding: 10px 13px; font-size: 0.85rem; color: var(--text); }
  .finding-reco b { color: var(--accent-strong); }
  .empty-state { display:flex; align-items:center; gap: 12px; padding: 18px; background: var(--risk-low-bg); color: var(--risk-low); border-radius: 10px; font-size: 0.9rem; font-weight: 600; }

  .rec-item { display:flex; gap: 10px; padding: 12px 14px; background: var(--bg); border-radius: 9px; margin-bottom: 8px; font-size: 0.88rem; }
  .rec-item svg { flex-shrink:0; margin-top: 2px; }

  footer.site-footer { border-top: 1px solid var(--border); padding: 28px 0; margin-top: 40px; }
  footer.site-footer p { color: var(--text-muted); font-size: 0.8rem; margin:0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--text); color: var(--bg); padding: 11px 18px; border-radius: 9px; font-size: 0.85rem; opacity:0; pointer-events:none; transition: opacity .2s, transform .2s; z-index: 50; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  @media (max-width: 640px) {
    .med-picker { grid-template-columns: 1fr 1fr; }
    .hero { padding: 44px 0 32px; }
  }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff; color: #10201E; }
    .site-header, .site-footer, .detail-tabs, .btn, .steps-strip, .cum-box,
    .quick-pick-hint, .toast, a[href]::after { display: none !important; }
    .container { max-width: 100%; padding: 0; }
    section { padding: 8px 0; }
    .tab-panel { display: block !important; break-inside: avoid; margin-bottom: 18px; }
    .print-only-title { display: block !important; font-family: var(--font-display); font-size: 1.2rem; margin: 18px 0 10px; border-bottom: 1px solid #ccc; padding-bottom: 6px; }
    .card, .risk-card, .finding, .persona-card, .overall-banner, .refs-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .overall-banner { display: block; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .print-methodology { display: block !important; margin-top: 24px; }
    .refs-section { grid-template-columns: 1fr; }
    .refs-card li a { color: #0B4F4C; }
  }
</style>

<div id="app"></div>
<div class="toast" id="toast"></div>

  // cargados desde el buscador CUM, descomponiendo el nombre por separadores de combinación
  // ("/" o "+") y buscando cada principio activo por separado. Nota metodológica: el riesgo de
  // interacción se evalúa por identidad del principio activo, no por su concentración en mg —
  // por eso la clasificación ignora dosis y solo compara nombres de sustancia normalizados.

    for (var group in MED_CATALOG) {

        m.name.split(/[\/+]/).forEach(function (tok) {
          var key = normalize(tok);
          if (key && !map[key]) map[key] = m.cls;
        });

    }
    return map;

  // en vez de tratar la combinación como una entidad opaca sin clasificar.
  function classifyMedName(name) {
    if (!SUBSTANCE_CLASS) SUBSTANCE_CLASS = buildSubstanceClassMap();
    var classes = [];
    var whole = findCatalogEntry(name);
    if (whole && whole.cls && classes.indexOf(whole.cls) === -1) classes.push(whole.cls);

        for (var k = 0; k < LASA_PAIRS.length; k++) {
          var lp = LASA_PAIRS[k];
          if ((normalize(lp.a) === normalize(med1.name) && normalize(lp.b) === normalize(med2.name)) ||
              (normalize(lp.b) === normalize(med1.name) && normalize(lp.a) === normalize(med2.name))) {
            matched = lp; break;
          }
        }
        if (matched) {
          var scoreMap = { Alto: 82, Medio: 58, Bajo: 28 };
          lasa.push({
            med1: med1.name, med2: med2.name, type: matched.type,
            score: scoreMap[matched.risk], level: matched.risk === "Alto" ? "high" : matched.risk === "Medio" ? "medium" : "low",
            source: "curada", src: matched.src || "ISMP 2023"
          });
          seenLasa[key2] = true;
        } else {
          var sim = similarity(med1.name, med2.name);
          if (sim >= 0.72) {
            var score = Math.round(sim * 100);
            lasa.push({
              med1: med1.name, med2: med2.name, type: "Ortográfica (algorítmica, Levenshtein)",
              score: score, level: levelFromScore(score), source: "algoritmo",
              src: "Similitud de cadenas — no listado por ISMP, verificar manualmente"
            });
            seenLasa[key2] = true;
          }
        }
      }
    }

    // Adherencia
    var nMeds = meds.length;
    var medsPts = nMeds <= 2 ? 0 : nMeds <= 5 ? 10 : nMeds <= 8 ? 20 : 30;

    var freqPoints = meds.map(function (m) {
      var f = FREQUENCIES.filter(function (x) { return x.v === m.freq; })[0];
      return f ? f.pts : 0;
    });
    var complexityPts = freqPoints.length ? Math.max.apply(null, freqPoints) : 0;
    var distinctFreqs = {};
    meds.forEach(function (m) { distinctFreqs[m.freq] = true; });
    if (Object.keys(distinctFreqs).length >= 3) complexityPts = Math.min(20, complexityPts + 5);

    var patientPts = 0;
    if ((patient.age || 0) > 75) patientPts += 5;
    if (patient.cognitiveImpairment) patientPts += 10;
    if (patient.conditions.indexOf("Depresion") !== -1) patientPts += 8;
    if (patient.lowEducation) patientPts += 5;
    if (patient.lowSocialSupport) patientPts += 7;

    var adherenceScore = Math.min(100, medsPts + complexityPts + patientPts);
    var adherenceFactors = [];
    if (nMeds > 2) adherenceFactors.push(nMeds + " medicamentos activos en el régimen");
    if (complexityPts >= 10) adherenceFactors.push("Régimen posológico complejo o con horarios irregulares");
    if ((patient.age || 0) > 75) adherenceFactors.push("Edad avanzada (>75 años)");
    if (patient.cognitiveImpairment) adherenceFactors.push("Deterioro cognitivo leve");
    if (patient.conditions.indexOf("Depresion") !== -1) adherenceFactors.push("Depresión/ansiedad no controlada");
    if (patient.lowEducation) adherenceFactors.push("Bajo nivel educativo");
    if (patient.lowSocialSupport) adherenceFactors.push("Falta de apoyo social o familiar");

    var adherenceRecs = [];
    if (adherenceScore > 60) {
      adherenceRecs.push("Revisión farmacéutica urgente y considerar desprescripción de fármacos no esenciales.");
      adherenceRecs.push("Intervención educativa intensiva y monitoreo frecuente del cumplimiento.");
    } else if (adherenceScore > 30) {
      adherenceRecs.push("Simplificar el régimen farmacológico cuando sea clínicamente posible.");
      adherenceRecs.push("Usar pastillero organizador o recordatorios de dosis.");
    } else {
      adherenceRecs.push("Mantener seguimiento habitual; refuerzo educativo básico sobre la importancia de la adherencia.");
    }

    // Puntuaciones agregadas e imagen global (sección 8.3 del modelo clínico)
    var graveCount = interactions.filter(function (x) { return x.severity === "grave"; }).length;
    var moderadaCount = interactions.filter(function (x) { return x.severity === "moderada"; }).length;
    var leveCount = interactions.filter(function (x) { return x.severity === "leve"; }).length;
    var interactionScore = Math.min(100, graveCount * 40 + moderadaCount * 20 + leveCount * 8);

    var lasaHigh = lasa.filter(function (x) { return x.level === "high"; }).length;
    var lasaMedium = lasa.filter(function (x) { return x.level === "medium"; }).length;
    var lasaLow = lasa.filter(function (x) { return x.level === "low"; }).length;
    var lasaScore = Math.min(100, lasaHigh * 35 + lasaMedium * 15 + lasaLow * 5);

    var overallScore, overallOverride = false;
    if (graveCount > 0) {
      overallScore = 100; overallOverride = true;
    } else {
      overallScore = Math.round(0.4 * interactionScore + 0.35 * adherenceScore + 0.25 * lasaScore);
    }

    return {
      meds: meds,
      interactions: interactions.sort(function (a, b) { return sevRank(b.severity) - sevRank(a.severity); }),
      lasa: lasa.sort(function (a, b) { return b.score - a.score; }),
      adherence: { score: adherenceScore, level: levelFromScore(adherenceScore), factors: adherenceFactors, recommendations: adherenceRecs },
      interactionScore: interactionScore, interactionLevel: levelFromScore(interactionScore),
      lasaScore: lasaScore, lasaLevel: levelFromScore(lasaScore),
      overallScore: overallScore, overallLevel: levelFromScore(overallScore), overallOverride: overallOverride,
      counts: { grave: graveCount, moderada: moderadaCount, leve: leveCount, lasaHigh: lasaHigh, lasaMedium: lasaMedium, lasaLow: lasaLow }
    };
  }

  function sevRank(s) { return s === "grave" ? 3 : s === "moderada" ? 2 : 1; }

    return '' +
      '<section class="hero container">' +
      '<p class="eyebrow">Polifarmacia · Paciente crónico pluripatológico</p>' +
      '<h1 class="display">Análisis de riesgo de polifarmacia para pacientes pluripatológicos</h1>' +
      '<p class="lede">Carga un arquetipo persona (hipertensión, diabetes, obesidad, dislipidemia, EPOC y otras comorbilidades) o registra un paciente propio, y obtén una clasificación de riesgo de interacciones, adherencia y confusión de medicamentos.</p>' +
      '<div style="display:flex;gap:12px;flex-wrap:wrap;">' +
      '<button class="btn btn-primary" onclick="PolyRisk.startBlank()">' + icon("pill", 16) + " Nuevo análisis</button>" +
      '<button class="btn btn-ghost" onclick="document.getElementById(\'personas\').scrollIntoView({behavior:\'smooth\'})">Ver arquetipos</button>' +
      "</div></section>" +
      '<section class="container" id="personas">' +
      '<h2 class="section-title">Arquetipos persona</h2>' +
      '<p class="section-sub">Tres perfiles representativos de paciente crónico pluripatológico, cada uno con un patrón de riesgo distinto — interacciones graves, vulnerabilidad renal o riesgo conductual de adherencia.</p>' +
      '<div class="persona-grid">' + personaCards + "</div></section>" +
      '<section class="container">' +
      '<h2 class="section-title">Qué evalúa el algoritmo</h2>' +
      '<p class="section-sub">Motor híbrido: reglas clínicas deterministas para interacciones y LASA, puntuación ponderada explicable para adherencia y riesgo global.</p>' +
      '<div class="feature-grid">' + features + "</div></section>" +
      '<section class="container" id="referencias">' +
      '<h2 class="section-title">Referencias y evidencia</h2>' +
      '<p class="section-sub">Distinguimos dos niveles: (1) hallazgos con <b>cita verificada</b> — el par o la interacción se comprobó línea por línea contra el texto completo del documento fuente (incluye 6 reglas de interacción verificadas contra los 133 criterios STOPP y 57 START de la versión 3, y los 2 confirmados contra Beers Criteria 2023), visible como "Fuente" en cada tarjeta de resultado; y (2) el resto del motor de reglas, que refleja <b>consenso farmacológico general</b> (mecanismos y severidades ampliamente documentados en la literatura) pero no encontró un criterio numerado exacto al revisar esos mismos documentos completos. La lista de pares LASA se verificó en su totalidad contra la lista oficial de ISMP. La fórmula de riesgo de adherencia es una puntuación heurística propia inspirada en los factores que identifican OMS y NICE; no es un instrumento validado.</p>' +
      '<p class="section-sub"><b>Nota metodológica — combinaciones y concentración:</b> el riesgo de interacción depende de la identidad del principio activo, no de su concentración en mg. Por eso el motor ignora la dosis al clasificar un medicamento y, para productos de combinación (p. ej. "Losartán/Hidroclorotiazida" o cualquier nombre con "/" o "+"), evalúa el riesgo de <i>cada</i> principio activo componente por separado en vez de tratar la combinación como una entidad opaca sin clasificar. El catálogo CUM se reconstruyó para permitir buscar por nombre comercial además de principio activo, y tanto el principio activo como el nombre comercial se simplificaron programáticamente (se removieron concentración, razones tipo "20/5" y forma de sal, p. ej. "Enalapril Maleato 20 mg" → "Enalapril") para habilitar esta clasificación y reducir registros redundantes de la misma marca en distintas concentraciones; esta limpieza es heurística sobre texto de INVIMA con formato inconsistente (incluye erratas propias de la fuente, como espacios faltantes), por lo que combinaciones con redacción atípica pueden no detectarse automáticamente — siempre verificar manualmente.</p>' +
      '<p class="section-sub"><b>Nota metodológica — efecto dual de las combinaciones:</b> un producto de combinación conlleva un riesgo de interacción <i>mayor</i> que la monoterapia, porque cada principio activo componente se evalúa por separado (ver nota anterior) y por tanto puede coincidir con más reglas de interacción que un solo fármaco. Sin embargo, ese mismo producto conlleva un riesgo de <i>no</i>-adherencia <i>menor</i> que tomar los mismos principios activos en tabletas separadas, porque reduce la carga de pastillas (pill burden): un metaanálisis de 44 estudios encontró adherencia significativamente mejor con combinación en tableta única frente a la misma combinación en tabletas libres en 18 de 23 estudios (Parati et al., Hypertension 2021; ver Referencias). El motor de riesgo de adherencia ya refleja esto sin necesidad de ajustar su fórmula, porque cuenta cada producto de combinación como un solo medicamento (una sola toma) en el factor "número de medicamentos" — el mismo dato que hace subir el riesgo de interacción es, para adherencia, un beneficio.</p>' +
      renderReferences() +
      "</section>";
  }

      "</section>";
  }

  // Busca tanto por principio activo (n) como por nombre comercial (p), ya que en la práctica
  // clínica suele conocerse la marca y no el principio activo. La coincidencia por inicio de
  // palabra se prioriza sobre la coincidencia parcial en cualquiera de los dos campos.
  function searchCum(query) {
    if (typeof CUM_CATALOG === "undefined" || !query || query.trim().length < 2) return [];
    var q = normalize(query.trim());
    var starts = [], includes = [];
    for (var i = 0; i < CUM_CATALOG.length; i++) {
      var entry = CUM_CATALOG[i];
      var n = normalize(entry.n), p = normalize(entry.p || "");
      if (n.indexOf(q) === 0 || p.indexOf(q) === 0) starts.push(entry);
      else if (n.indexOf(q) !== -1 || p.indexOf(q) !== -1) includes.push(entry);
      if (starts.length >= 25) break;
    }
    return starts.concat(includes).slice(0, 25);
  }

  function renderStepsStrip() {
    var steps = [
      "Elige un arquetipo o crea un paciente nuevo",
      "Marca condiciones crónicas — se listan los medicamentos más frecuentes",
      "Selecciona los medicamentos con un clic (dosis habitual precargada)",
      "Analiza y revisa el riesgo con la evidencia citada"
    ];
    return '<div class="steps-strip">' + steps.map(function (s, i) {
      return '<div class="step-item"><span class="step-num">' + (i + 1) + "</span><span>" + s + "</span></div>";
    }).join("") + "</div>";
  }

  function isMedInDraft(name) {
    var n = normalize(name);
    return state.draftMeds.some(function (m) { return normalize(m.name) === n; });
  }

  function renderQuickPicks() {
    if (!state.formConditions || state.formConditions.length === 0) {
      return '<p class="quick-pick-hint">Selecciona una o más condiciones crónicas arriba para ver aquí sus medicamentos más frecuentes, con dosis habitual lista para agregar con un clic.</p>';
    }
    return state.formConditions.map(function (condId) {
      var meds = MED_CATALOG[condId] || [];
      if (meds.length === 0) return "";
      var byClass = {};
      var order = [];
      meds.forEach(function (m) {
        if (!byClass[m.cls]) { byClass[m.cls] = []; order.push(m.cls); }
        byClass[m.cls].push(m);
      });
      var condLabel = CONDITIONS.filter(function (c) { return c.id === condId; })[0];
      var classBlocks = order.map(function (cls) {
        var rows = byClass[cls].map(function (m) {
          var checked = isMedInDraft(m.name);
          var freqLabel = (FREQUENCIES.filter(function (f) { return f.v === m.freq; })[0] || {}).label || "";
          return '<label class="quick-row ' + (checked ? "checked" : "") + '">' +
            '<input type="checkbox" ' + (checked ? "checked" : "") + ' onchange="PolyRisk.toggleQuickMed(\'' + condId + "', '" + m.name.replace(/'/g, "\\'") + '\')"/>' +
            "<span>" + escapeHtml(m.name) + '</span><span class="quick-dose">' + escapeHtml(m.dosage) + (freqLabel ? " · " + freqLabel : "") + "</span>" +
            "</label>";
        }).join("");
        return '<div class="quick-class-title">' + withAbbr(CLASS_LABELS[cls] || cls) + '</div><div class="quick-rows">' + rows + "</div>";
      }).join("");
      return '<div class="quick-group"><div class="quick-group-title">' + withAbbr(condLabel ? condLabel.label : condId) + "</div>" + classBlocks + "</div>";
    }).join("");
  }

  function renderCumBox() {
    if (typeof CUM_CATALOG === "undefined") return "";
    var query = state.cumQuery || "";
    state.cumResults = searchCum(query);
    var resultsHtml = state.cumResults.map(function (r, idx) {
      return '<div class="cum-item"><div><div class="cum-item-name">' + escapeHtml(r.n) + (r.p ? ' <span class="cum-item-brand">(' + escapeHtml(r.p) + ')</span>' : '') + '</div>' +
        '<div class="cum-item-meta">' + escapeHtml(r.atc || "—") + " · " + escapeHtml(r.d || "") + " · " + escapeHtml(r.r || "") + "</div></div>" +
        '<button type="button" class="btn btn-ghost btn-sm" onclick="PolyRisk.useCumEntry(' + idx + ')">Usar</button></div>';
    }).join("");
    var countLabel = query.trim().length < 2
      ? '<p class="cum-count">Escribe al menos 2 caracteres para buscar.</p>'
      : '<p class="cum-count">' + state.cumResults.length + (state.cumResults.length === 25 ? "+ " : " ") + "resultado" + (state.cumResults.length === 1 ? "" : "s") + " sobre " + CUM_CATALOG.length + " registros vigentes (marca + principio activo).</p>";
    return '' +
      '<div class="cum-box">' +
      '<p class="subtle-title">Buscar en el catálogo oficial (CUM)</p>' +
      '<p class="cum-source">Registros vigentes del INVIMA, vía <a href="https://www.datos.gov.co/Salud-y-Protecci-n-Social/C-DIGO-NICO-DE-MEDICAMENTOS-VIGENTES/i7cb-raxc/about_data" target="_blank" rel="noopener">datos.gov.co — Código Único de Medicamentos</a>. Se agrega el medicamento por su principio activo (el nombre comercial se muestra entre paréntesis solo como referencia); si es un producto de combinación, revisa si aparece en más de un registro y agrégalos por separado.</p>' +
      '<div class="field"><input id="cum-search" placeholder="Ej. losartán, Cozaar, metformina…" value="' + escapeHtml(query) + '" oninput="PolyRisk.setCumQuery(this.value)"/></div>' +
      countLabel +
      '<div class="cum-results">' + resultsHtml + "</div>" +
      "</div>";
  }

  function renderResults() {
    var a = state.analysis, p = state.patient;
    if (!a) return '<div class="container" style="padding:60px 0;">Sin análisis disponible.</div>';

    var summary = '' +
      '<div class="summary-grid">' +
      riskCard("Interacciones medicamentosas", a.interactionScore, a.interactionLevel, a.counts.grave + " grave · " + a.counts.moderada + " moderada · " + a.counts.leve + " leve") +
      riskCard("Riesgo de adherencia", a.adherence.score, a.adherence.level, a.adherence.factors.length + " factores contribuyentes") +
      riskCard("Confusión LASA", a.lasaScore, a.lasaLevel, a.counts.lasaHigh + " alto · " + a.counts.lasaMedium + " medio · " + a.counts.lasaLow + " bajo") +
      "</div>";

    var overall = '' +
      '<div class="overall-banner" style="background:var(--risk-' + a.overallLevel + '-bg);border-color:var(--risk-' + a.overallLevel + ');">' +
      '<div><div class="label">Riesgo global del paciente</div>' +
      '<div class="value" style="color:var(--risk-' + a.overallLevel + ')">' + levelLabel(a.overallLevel) + " · " + a.overallScore + "/100</div>" +
      (a.overallOverride ? '<p style="margin:6px 0 0;font-size:0.82rem;color:var(--text-muted);">Elevado automáticamente por regla de anulación: existe al menos una interacción grave.</p>' : "") +
      "</div>" +
      '<button class="btn btn-ghost" onclick="PolyRisk.exportReport()">Exportar / imprimir reporte</button>' +
      "</div>";

    var tabs = [
      { id: "interactions", label: "Interacciones (" + a.interactions.length + ")" },
      { id: "lasa", label: "LASA (" + a.lasa.length + ")" },
      { id: "adherence", label: "Adherencia" },
      { id: "recs", label: "Recomendaciones" }
    ].map(function (t) {
      return '<button class="' + (state.detailTab === t.id ? "active" : "") + '" onclick="PolyRisk.setDetailTab(\'' + t.id + '\')">' + t.label + "</button>";
    }).join("");

    var interactionsBody = a.interactions.length ? a.interactions.map(function (x) {
      return '<div class="finding" style="--stripe:' + stripeVar(x.severity === "grave" ? "high" : x.severity === "moderada" ? "medium" : "low") + ';">' +
        '<div class="finding-head"><span class="finding-pair">' + escapeHtml(x.med1) + " + " + escapeHtml(x.med2) + "</span>" +
        pill(x.severity === "grave" ? "high" : x.severity === "moderada" ? "medium" : "low") + "</div>" +
        '<p class="finding-mech">' + withAbbr(x.mechanism) + "</p>" +
        "<p>" + withAbbr(x.description) + "</p>" +
        '<div class="finding-reco"><b>Recomendación:</b> ' + withAbbr(x.recommendation) + "</div>" +
        '<p style="margin:8px 0 0;font-size:0.74rem;color:var(--text-muted);">Fuente: ' + escapeHtml(x.src || "sin verificar") + "</p></div>";
    }).join("") : emptyState("No se detectaron interacciones medicamentosas relevantes.");

    var lasaBody = a.lasa.length ? a.lasa.map(function (x) {
      return '<div class="finding" style="--stripe:' + stripeVar(x.level) + ';">' +
        '<div class="finding-head"><span class="finding-pair">' + escapeHtml(x.med1) + " ↔ " + escapeHtml(x.med2) + "</span>" + pill(x.level) + "</div>" +
        '<p class="finding-mech">Similitud ' + escapeHtml(x.type) + " · puntuación " + x.score + "/100 · fuente: " + escapeHtml(x.src || "sin verificar") + "</p>" +
        '<div class="finding-reco"><b>Medida de seguridad:</b> Usar nombres genéricos en la prescripción; almacenar y etiquetar por separado; alertar en dispensación.</div></div>';
    }).join("") : emptyState("No se detectaron pares de medicamentos con riesgo de confusión (LASA).");

    var adherenceBody = '<div class="card card-pad">' +
      '<p class="subtle-title">Factores contribuyentes</p>' +
      (a.adherence.factors.length ? a.adherence.factors.map(function (f) {
        return '<div class="rec-item">' + icon("alert", 16) + "<span>" + withAbbr(f) + "</span></div>";
      }).join("") : '<p style="color:var(--text-muted);">Sin factores adicionales relevantes.</p>') +
      '<p class="subtle-title" style="margin-top:18px;">Recomendaciones</p>' +
      a.adherence.recommendations.map(function (r) {
        return '<div class="rec-item">' + icon("check", 16) + "<span>" + withAbbr(r) + "</span></div>";
      }).join("") +
      "</div>";

    var allRecs = a.adherence.recommendations.concat([
      "Revisar la necesidad de cada medicamento y considerar deprescripción cuando corresponda.",
      "Educar al paciente sobre la importancia de la adherencia y el reconocimiento de efectos adversos.",
      "Monitoreo periódico de función renal/hepática y de la respuesta terapéutica.",
      "Implementar medidas de seguridad para prevenir errores de medicación (nombres genéricos, doble verificación)."
    ]);
    var recsBody = '<div class="card card-pad">' + allRecs.map(function (r) {
      return '<div class="rec-item">' + icon("check", 16) + "<span>" + withAbbr(r) + "</span></div>";
    }).join("") + "</div>";

    var panels = [
      { id: "interactions", title: "Interacciones medicamentosas", html: interactionsBody },
      { id: "lasa", title: "Confusión de medicamentos (LASA)", html: lasaBody },
      { id: "adherence", title: "Riesgo de adherencia", html: adherenceBody },
      { id: "recs", title: "Recomendaciones", html: recsBody }
    ];
    var body = panels.map(function (pnl) {
      return '<div class="tab-panel' + (state.detailTab === pnl.id ? " active" : "") + '" data-tab="' + pnl.id + '">' +
        '<h3 class="print-only-title">' + pnl.title + "</h3>" + pnl.html + "</div>";
    }).join("");

    var medList = a.meds.map(function (m) {
      var classLabel = (m.classes && m.classes.length)
        ? m.classes.map(function (c) { return CLASS_LABELS[c] || c; }).join(" + ")
        : "Sin clasificar";
      return '<div class="med-row"><div><div class="med-name">' + escapeHtml(m.name) + '</div><div class="med-detail">' +
        escapeHtml(m.dosage || "—") + " · " + escapeHtml(m.indication || "") + "</div></div>" +
        '<span class="tag">' + withAbbr(classLabel) + "</span></div>";
    }).join("");

    return '' +
      '<section class="container" style="padding-top:36px;">' +
      '<div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:24px;">' +
      '<div><h2 class="section-title" style="margin-bottom:2px;">Resultados — ' + escapeHtml(p.name || "Paciente") + "</h2>" +
      '<p class="section-sub" style="margin:0;">' + (p.age ? p.age + " años · " : "") + p.conditions.length + " condiciones crónicas · " + a.meds.length + " medicamentos</p></div>" +
      '<div style="display:flex;gap:8px;">' +
      '<button class="btn btn-ghost btn-sm" onclick="PolyRisk.goToReferences()">Metodología y referencias</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="PolyRisk.startBlank()">Nuevo análisis</button>' +
      "</div>" +
      "</div>" +
      summary + overall +
      '<div class="card card-pad" style="margin-bottom:24px;"><p class="subtle-title">Medicamentos analizados</p><div class="med-list">' + medList + "</div></div>" +
      '<div class="detail-tabs">' + tabs + "</div>" +
      body +
      '<div class="print-methodology">' +
      '<h3 class="print-only-title">Metodología y referencias</h3>' +
      '<p style="font-size:0.8rem;color:var(--text-muted);margin:0 0 14px;">Cada hallazgo de este informe cita su fuente ("Fuente: ...") junto a la recomendación. Bibliografía completa a continuación.</p>' +
      renderReferences() +
      "</div>" +
      "</section>";
  }

  function riskCard(title, score, level, sub) {
    return '' +
      '<div class="risk-card" style="--stripe:' + stripeVar(level) + ';">' +
      "<h4>" + title + "</h4>" +
      '<div class="risk-score">' + score + '<span style="font-size:1rem;color:var(--text-muted);"> /100</span></div>' +
      '<div class="meter"><span style="width:' + score + "%;background:" + stripeVar(level) + ';"></span></div>' +
      pill(level) + '<p style="margin:10px 0 0;font-size:0.8rem;color:var(--text-muted);">' + sub + "</p>" +
      "</div>";
  }

  function emptyState(msg) {
    return '<div class="empty-state">' + icon("check", 18) + "<span>" + msg + "</span></div>";
  }

  function render() {
    var html = header();
    if (state.view === "home") html += renderHome();
    else if (state.view === "form") html += renderForm();
    else if (state.view === "results") html += renderResults();
    html += footer();
    document.getElementById("app").innerHTML = html;
  }

  /* ---------------------------------------------------------------------
   * 5. ACCIONES
   * ------------------------------------------------------------------- */

  function toggleCondition(id) {
    if (!state.formConditions) state.formConditions = [];
    var idx = state.formConditions.indexOf(id);
    if (idx === -1) state.formConditions.push(id); else state.formConditions.splice(idx, 1);
    render();
  }

  function toggleQuickMed(condId, medName) {
    var n = normalize(medName);
    var existingIdx = -1;
    for (var i = 0; i < state.draftMeds.length; i++) {
      if (normalize(state.draftMeds[i].name) === n) { existingIdx = i; break; }
    }
    if (existingIdx !== -1) {
      state.draftMeds.splice(existingIdx, 1);
    } else {
      var entry = (MED_CATALOG[condId] || []).filter(function (m) { return normalize(m.name) === n; })[0];
      if (!entry) return;
      var condLabel = CONDITIONS.filter(function (c) { return c.id === condId; })[0];
      state.draftMeds.push({
        name: entry.name, dosage: entry.dosage, freq: entry.freq || "1x",
        route: entry.route || "oral", indication: condLabel ? condLabel.label : condId
      });
    }
    render();
  }

  function addDraftMed() {
    var name = document.getElementById("m-name").value.trim();
    if (!name) { toast("Ingresa el nombre del medicamento"); return; }
    state.draftMeds.push({
      name: name,
      dosage: document.getElementById("m-dosage").value.trim(),
      freq: document.getElementById("m-freq").value,
      route: document.getElementById("m-route").value,
      indication: document.getElementById("m-indication").value.trim()
    });
    state.medDraft = { name: "", dosage: "", freq: "1x", route: "oral", indication: "" };
    render();
    toast("Medicamento agregado");
  }

  function removeDraftMed(idx) {
    state.draftMeds.splice(idx, 1);
    render();
  }

  function runAnalysis() {
    var name = document.getElementById("f-name").value.trim() || "Paciente sin nombre";
    if (state.draftMeds.length === 0) { toast("Agrega al menos un medicamento"); return; }
    if (!state.formConditions || state.formConditions.length === 0) { toast("Selecciona al menos una condición crónica"); return; }

    state.patient = {
      name: name,
      age: parseInt(document.getElementById("f-age").value, 10) || null,
      gender: document.getElementById("f-gender").value,
      imc: document.getElementById("f-imc").value.trim(),
      conditions: state.formConditions.slice(),
      cognitiveImpairment: document.getElementById("f-cog").checked,
      lowEducation: document.getElementById("f-edu").checked,
      lowSocialSupport: document.getElementById("f-support").checked,
      meds: state.draftMeds.slice()
    };
    state.analysis = analyzePatient(state.patient);
    state.detailTab = "interactions";
    setView("results");
  }

  function setDetailTab(id) { state.detailTab = id; render(); }

  function goToReferences() {
    state.view = "home";
    render();
    var el = document.getElementById("referencias");
    if (el) el.scrollIntoView({ behavior: "smooth" });
  }

  function exportReport() {
    try {
      if (typeof window.print !== "function") throw new Error("print no disponible");
      window.print();
    } catch (e) {
      toast("Tu navegador bloqueó la impresión aquí. Abre la app en una pestaña normal (no dentro de una vista incrustada) e intenta de nuevo, o usa Ctrl/Cmd+P.");
    }
  }

  function setCumQuery(value) {
    state.cumQuery = value;
    render();
    var input = document.getElementById("cum-search");
    if (input) {
      input.focus();
      var pos = input.value.length;
      input.setSelectionRange(pos, pos);
    }
  }

  function useCumEntry(idx) {
    var entry = (state.cumResults || [])[idx];
    if (!entry) return;
    document.getElementById("m-name").value = entry.n;
    document.getElementById("m-indication").value = entry.d || "";
    var routes = (entry.r || "").split("|");
    var routeSelect = document.getElementById("m-route");
    if (routes.indexOf("INHALATORIA") !== -1 || routes.indexOf("INHALADA") !== -1) routeSelect.value = "inhalation";
    else if (routes.indexOf("TOPICA") !== -1 || routes.indexOf("TÓPICA") !== -1) routeSelect.value = "topical";
    else if (routes.indexOf("ORAL") !== -1) routeSelect.value = "oral";
    document.getElementById("m-name").focus();
    toast("Datos cargados desde el catálogo CUM");
  }

  window.PolyRisk = {
    setView: setView, loadPersona: loadPersona, startBlank: startBlank,
    toggleCondition: toggleCondition, toggleQuickMed: toggleQuickMed, addDraftMed: addDraftMed, removeDraftMed: removeDraftMed,
    runAnalysis: runAnalysis, setDetailTab: setDetailTab, setCumQuery: setCumQuery, useCumEntry: useCumEntry,
    goToReferences: goToReferences, exportReport: exportReport
  };

  state.formConditions = [];
  render();
})();
</script>

</body>
</html>
